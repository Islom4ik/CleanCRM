<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/output.css">
</head>
<body class="bg-primary">
    <header>
        <div>
            <img src="../images/logo.png" alt="" class="w-24 rounded-full cursor-pointer h-24 absolute left-10 top-10 shadow_white">
        </div>
    </header>

    <main class="w-full h-screen flex justify-center items-center">
        <div class="bg-white p-6 md:p-10 rounded-sm shadow_white">
            <form action="" class="flex flex-col">
                <label class="" for="login">Login</label>
                <input class=" border px-3 py-1" type="text" id="login" for="login">
                <label class="mt-2" for="password">Password</label>
                <input class=" border px-3 py-1" type="password" id="password" for="password">
                <input type="submit" value="Log-In" class="border px-3 py-1 mt-4 cursor-pointer bg-blue-500 hover:bg-blue-700 transition-all text-white font-semibold "> 
            </form>
        </div>
    </main>
</body>
</html>
